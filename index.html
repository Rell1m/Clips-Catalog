  <style>
    :root{
      --bg:#0b0d12;
      --panel:rgba(255,255,255,.04);
      --text:#eef1f7;
      --muted:#a8b0c2;
      --line:rgba(255,255,255,.08);
      --accent:#7c8cff;
      --accent-2:#67d6c4;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(124,140,255,.15), transparent 30%),
        radial-gradient(circle at right, rgba(103,214,196,.10), transparent 22%),
        var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .app{max-width:1320px;margin:0 auto;padding:24px 16px 40px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .hero h1{margin:0;font-size:30px;line-height:1.1;letter-spacing:.2px}
    .controls{display:flex;gap:10px;align-items:center;flex:1 1 540px;justify-content:flex-end;flex-wrap:wrap}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:11px 14px;
      border-radius:14px;
      cursor:pointer;
      transition:.18s ease;
    }
    .tab:hover{transform:translateY(-1px); background:rgba(255,255,255,.07)}
    .tab.active{background:linear-gradient(135deg, rgba(124,140,255,.25), rgba(103,214,196,.18)); border-color:rgba(124,140,255,.35)}
    .search{
      flex:1 1 320px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }
    .search input{width:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:15px}
    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:13px 14px;
      border-radius:16px;
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px); background:rgba(255,255,255,.07)}
    .btn.primary{background:linear-gradient(135deg, rgba(124,140,255,.22), rgba(103,214,196,.16)); border-color:rgba(124,140,255,.28)}
    .layout{display:grid;grid-template-columns:290px 1fr;gap:18px;align-items:start}
    .sidebar,.content,.modal-card,.viewer-card{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));box-shadow:var(--shadow);backdrop-filter: blur(10px)}
    .sidebar{padding:18px;position:sticky;top:18px}
    .section-title{margin:0 0 12px;font-size:15px;color:#dfe4f2}
    .tag-cloud{display:flex;flex-wrap:wrap;gap:8px}
    .tag{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
      user-select:none;
      transition:.18s ease;
      line-height:1;
    }
    .tag:hover{transform:translateY(-1px)}
    .tag.active{background:linear-gradient(135deg, rgba(124,140,255,.25), rgba(103,214,196,.18)); border-color:rgba(124,140,255,.35)}
    .content{padding:18px}
    .results-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .small{color:var(--muted);font-size:13px;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));gap:14px}
    .card{overflow:hidden;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.04);cursor:pointer;transition:.2s ease;display:flex;flex-direction:column;min-height:100%}
    .card:hover{transform:translateY(-3px); border-color:rgba(124,140,255,.25)}
    .thumb-wrap{position:relative;aspect-ratio:16/10;background:linear-gradient(135deg, rgba(124,140,255,.22), rgba(103,214,196,.14))}
    .thumb{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:13px 13px 14px;display:flex;flex-direction:column;gap:10px;flex:1}
    .card h3{margin:0;font-size:16px;line-height:1.25}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{font-size:12px;color:#dce3ff;padding:5px 8px;border-radius:999px;background:rgba(124,140,255,.12);border:1px solid rgba(124,140,255,.18)}
    .card-actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}
    .card-actions .btn{padding:10px 12px;border-radius:14px;font-size:13px}
    .empty{padding:30px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:20px;background:rgba(255,255,255,.03)}
    .modal,.viewer{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(5,7,12,.74);z-index:50}
    .modal.open,.viewer.open{display:flex}
    .modal-card{width:min(980px, 100%);max-height:min(90vh, 940px);overflow:auto;padding:18px}
    .modal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}
    .modal-top h2{margin:0 0 8px;font-size:26px;line-height:1.1}
    .close{border:0;background:rgba(255,255,255,.06);color:var(--text);width:42px;height:42px;border-radius:14px;cursor:pointer;flex:0 0 auto}
    .hero-img{width:100%;max-height:340px;object-fit:cover;border-radius:18px;border:1px solid var(--line);margin-bottom:14px;background:rgba(255,255,255,.04)}
    .detail-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
    .panel{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:18px;padding:14px}
    .panel h4{margin:0 0 10px;font-size:14px}
    .fragments{display:grid;gap:10px}
    .fragment{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:12px;
      align-items:start;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      cursor:pointer;
      transition:.18s ease;
    }
    .fragment:hover{transform:translateY(-1px); border-color:rgba(124,140,255,.22)}
    .fragment img{width:120px;height:72px;object-fit:cover;border-radius:12px;background:rgba(255,255,255,.04)}
    .fragment p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
    .modal-actions{display:flex;gap:10px;flex-wrap:wrap}
    .viewer-card{width:min(1100px, 100%);max-height:min(92vh, 980px);overflow:hidden;padding:14px;display:flex;flex-direction:column;gap:12px}
    .viewer-card img{width:100%;max-height:82vh;object-fit:contain;background:#000;border-radius:18px}
    .viewer-bar{display:flex;justify-content:space-between;align-items:center;gap:12px}
    @media (max-width:960px){.layout{grid-template-columns:1fr}.sidebar{position:relative;top:0}.detail-grid{grid-template-columns:1fr}}
    @media (max-width:560px){.grid{grid-template-columns:1fr 1fr}.fragment{grid-template-columns:1fr}.fragment img{width:100%;height:170px}}
    @media (max-width:420px){.grid{grid-template-columns:1fr}.hero h1{font-size:26px}}
  </style>
</head>

  <div class="app">

      <div class="hero"><h1>Каталог клипов</h1></div>

          <button class="tab active" data-type="anime">Аниме</button>
          <button class="tab" data-type="movie">Фильмы</button>
        </div>
        <div class="search">
          <span>⌕</span>
          <input id="searchInput" type="text" placeholder="Поиск по названию, описанию или тегам..." />
        </div>
        <button class="btn" id="clearFilters">Сбросить</button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <h3 class="section-title">Теги</h3>
        <div class="tag-cloud" id="tagCloud"></div>
        <div class="meta-box" style="margin-top:18px;padding:14px;border-radius:18px;background:rgba(0,0,0,.16);border:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.5">
          Выбирай несколько тегов сразу. В фильтре показываются только карточки, где совпадают все выбранные теги.
        </div>
      </aside>

      <main class="content">
        <div class="results-bar">
          <strong id="resultsText">Загрузка...</strong>
          <span class="small" id="activeFilters"></span>
        </div>
        <div class="grid" id="grid"></div>
      </main>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h2 id="modalTitle"></h2>
          <div class="small" id="modalTags"></div>
        </div>
        <button class="close" id="closeModal">✕</button>
      </div>

      <img class="hero-img" id="modalHero" alt="Обложка" />

      <div class="detail-grid">
        <section class="panel">
          <h4>Описание</h4>
          <div class="small" id="modalDescription"></div>
        </section>
        <section class="panel">
          <h4>Скачать</h4>
          <div class="modal-actions">
            <a id="downloadBtn" class="btn primary" href="#" target="_blank" rel="noopener">Скачать</a>
          </div>
        </section>
      </div>

      <section class="panel" style="margin-top:14px">
        <h4>Фрагменты</h4>
        <div class="fragments" id="fragmentList"></div>
      </section>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <div class="viewer-card">
      <div class="viewer-bar">
        <strong id="viewerTitle">Просмотр изображения</strong>
        <button class="close" id="closeViewer">✕</button>
      </div>
      <img id="viewerImg" alt="Просмотр" />

        type: 'movie',
        description: 'Фильм для темных и умных монтажей.',
        tags: ['mind', 'thriller', 'epic'],
        cover: '',
        download: '#',
        fragments: [
          { img: '', text: 'Фрагмент для тревожного темпа.' },
          { img: '', text: 'Сцена под мощный переход.' }
        ]
      }
    ];

    const grid = document.getElementById('grid');
    const tagCloud = document.getElementById('tagCloud');
    const searchInput = document.getElementById('searchInput');
    const resultsText = document.getElementById('resultsText');
    const activeFilters = document.getElementById('activeFilters');
    const clearFilters = document.getElementById('clearFilters');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalTags = document.getElementById('modalTags');
    const modalDescription = document.getElementById('modalDescription');
    const modalHero = document.getElementById('modalHero');
    const modalDownload = document.getElementById('downloadBtn');
    const fragmentList = document.getElementById('fragmentList');
    const viewer = document.getElementById('viewer');
    const viewerImg = document.getElementById('viewerImg');
    const viewerTitle = document.getElementById('viewerTitle');
    const closeViewer = document.getElementById('closeViewer');

    let currentType = 'anime';
    let selectedTags = [];
    let query = '';

    const allTags = () => [...new Set(
      data
        .filter(item => item.type === currentType)
        .flatMap(item => Array.isArray(item.tags) ? item.tags : [])
    )].sort((a, b) => a.localeCompare(b, 'ru'));

    function placeholder(title, seed) {
      const letter = (title || '?').trim().slice(0, 1).toUpperCase();
      const bg1 = ['#7c8cff', '#67d6c4', '#ff7aa2', '#f3a65a', '#8d6cff'][seed % 5];
      const bg2 = ['#121622', '#0f1420', '#14111c', '#151824', '#10151f'][(seed + 2) % 5];
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${bg1}" stop-opacity="0.95" />
              <stop offset="100%" stop-color="${bg2}" stop-opacity="1" />
            </linearGradient>
          </defs>
          <rect width="1200" height="750" rx="48" fill="url(#g)" />
          <circle cx="980" cy="120" r="220" fill="rgba(255,255,255,0.07)" />
          <circle cx="220" cy="620" r="260" fill="rgba(255,255,255,0.05)" />
          <text x="80" y="620" fill="white" font-size="280" font-family="Arial, sans-serif" font-weight="700">${letter}</text>
        </svg>
      `;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    function renderTags() {
      tagCloud.innerHTML = '';
      const tags = allTags();
      if (tags.length === 0) {
        tagCloud.innerHTML = '<div class="small">Теги не добавлены</div>';
        return;
      }
      tags.forEach(tag => {
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'tag' + (selectedTags.includes(tag) ? ' active' : '');
        el.textContent = '#' + tag;
        el.addEventListener('click', () => {
          selectedTags = selectedTags.includes(tag)
            ? selectedTags.filter(t => t !== tag)
            : [...selectedTags, tag];
          renderTags();
          renderCards();
        });
        tagCloud.appendChild(el);
      });
    }

    function matches(item) {
      const title = String(item.title || '').toLowerCase();
      const description = String(item.description || '').toLowerCase();
      const tags = Array.isArray(item.tags) ? item.tags : [];
      const hay = [title, description, ...tags].join(' ');
      const q = query.trim().toLowerCase();
      const queryOk = !q || hay.includes(q);
      const tagsOk = selectedTags.length === 0 || selectedTags.every(tag => tags.includes(tag));
      return item.type === currentType && queryOk && tagsOk;
    }

    function renderCards() {
      const filtered = data.filter(matches);
      grid.innerHTML = '';
      resultsText.textContent = `Найдено: ${filtered.length}`;
      const parts = [currentType === 'anime' ? 'раздел: Аниме' : 'раздел: Фильмы'];
      if (query) parts.push(`поиск: “${query}”`);
      if (selectedTags.length) parts.push(`теги: ${selectedTags.map(t => '#' + t).join(', ')}`);
      activeFilters.textContent = parts.join(' · ');

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">Ничего не найдено. Измени поиск или теги.</div>';
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';

        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap';

        const img = document.createElement('img');
        img.className = 'thumb';
        img.alt = item.title || 'Обложка';
        img.src = item.cover || placeholder(item.title, item.id || 0);
        img.addEventListener('error', () => {
          img.onerror = null;
          img.src = placeholder(item.title, item.id || 0);
        });
        wrap.appendChild(img);

        const body = document.createElement('div');
        body.className = 'card-body';

        const h3 = document.createElement('h3');
        h3.textContent = item.title || 'Без названия';

        const p = document.createElement('p');
        p.textContent = item.description || 'Описание не добавлено.';

        const chips = document.createElement('div');
        chips.className = 'chips';
        (Array.isArray(item.tags) ? item.tags : []).forEach(tag => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = '#' + tag;
          chips.appendChild(chip);
        });

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const downloadBtn = document.createElement('a');
        downloadBtn.className = 'btn primary';
        downloadBtn.textContent = 'Скачать';
        downloadBtn.href = item.download || '#';
        downloadBtn.target = '_blank';
        downloadBtn.rel = 'noopener';
        downloadBtn.addEventListener('click', (e) => e.stopPropagation());
        if (!item.download || item.download === '#') {
          downloadBtn.addEventListener('click', (e) => e.preventDefault());
          downloadBtn.setAttribute('aria-disabled', 'true');
        }

        actions.appendChild(downloadBtn);

        body.appendChild(h3);
        body.appendChild(p);
        body.appendChild(chips);
        body.appendChild(actions);

        card.appendChild(wrap);
        card.appendChild(body);
        card.addEventListener('click', () => openModal(item));

        grid.appendChild(card);
      });
    }

    function openViewer(src, title) {
      viewerImg.src = src;
      viewerTitle.textContent = title || 'Просмотр изображения';
      viewer.classList.add('open');
    }

    function closeViewerFn() {
      viewer.classList.remove('open');
      viewerImg.src = '';
    }

    function openModal(item) {
      modalTitle.textContent = item.title || 'Без названия';
      modalTags.textContent = (Array.isArray(item.tags) ? item.tags : []).map(t => '#' + t).join('  ');
      modalDescription.textContent = item.description || 'Описание не добавлено.';
      modalHero.src = item.cover || placeholder(item.title, item.id || 0);
      modalDownload.href = item.download || '#';
      modalDownload.target = '_blank';
      modalDownload.rel = 'noopener';
      modalDownload.onclick = (e) => {
        e.stopPropagation();
        if (!item.download || item.download === '#') e.preventDefault();
      };

      fragmentList.innerHTML = '';
      const fragments = Array.isArray(item.fragments) ? item.fragments : [];
      if (fragments.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = 'Фрагменты не добавлены.';
        fragmentList.appendChild(empty);
      } else {
        fragments.forEach((frag, index) => {
          const row = document.createElement('div');
          row.className = 'fragment';

          const img = document.createElement('img');
          img.alt = 'Фрагмент';
          const src = frag.img || placeholder(`${item.title} ${index + 1}`, (item.id || 0) + index + 1);
          img.src = src;
          img.addEventListener('error', () => {
            img.onerror = null;
            img.src = placeholder(`${item.title} ${index + 1}`, (item.id || 0) + index + 1);
          });

          const text = document.createElement('p');
          text.textContent = frag.text || 'Описание фрагмента не добавлено.';

          row.appendChild(img);
          row.appendChild(text);
          row.addEventListener('click', () => openViewer(src, `${item.title} — фрагмент ${index + 1}`));

          fragmentList.appendChild(row);
        });
      }

      modal.classList.add('open');
    }

    function resetFilters() {
      query = '';
      selectedTags = [];
      searchInput.value = '';
      renderTags();
      renderCards();
    }

    searchInput.addEventListener('input', (e) => {
      query = e.target.value;
      renderCards();
    });

    clearFilters.addEventListener('click', resetFilters);
    closeModal.addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        modal.classList.remove('open');
        closeViewerFn();
      }
    });

    closeViewer.addEventListener('click', closeViewerFn);
    viewer.addEventListener('click', (e) => {
      if (e.target === viewer) closeViewerFn();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        tab.classList.add('active');
        currentType = tab.dataset.type;
        selectedTags = [];
        renderTags();
        renderCards();
      });
    });

    renderTags();
    renderCards();
  </script>
</body>
</html>
